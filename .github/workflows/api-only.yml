name: API Only Checks

on:
    pull_request:
        paths:
            - "back/**"
            - "packages/types/**"
            - "package.json"
            - "pnpm-lock.yaml"
            - "pnpm-workspace.yaml"
            - "eslint.config.mjs"
            - ".github/workflows/api-only.yml"
    workflow_dispatch:

jobs:
    api-checks:
        name: API Lint and Build
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.33.0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Check formatting
              run: pnpm format:check

            - name: Lint API
              run: pnpm --filter api lint

            - name: Build API
              run: pnpm --filter api build
